version: '3.8'

services:
  postgres:
    image: postgres:16
    container_name: judge_postgres
    restart: always
    environment:
      POSTGRES_USER: judge_admin
      POSTGRES_PASSWORD: judge_pass123
      POSTGRES_DB: online_judge
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: judge_redis
    restart: always
    ports:
      - "6379:6379"

volumes:
  pgdata: